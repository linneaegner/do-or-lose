name: Web Build + Deploy to GitHub Pages

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FLET_CLI_NO_RICH_OUTPUT: "1"

jobs:
  build:
    name: Build web app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Flet
        run: pip install flet==0.85.1

      - name: Publish web app
        run: |
          flet publish main.py \
            --base-url "${GITHUB_REPOSITORY#*/}" \
            --route-url-strategy hash \
            --app-name "Kvällskort" \
            --app-short-name "Kvällskort" \
            --app-description "Kvällskort — partykortspel med 100 textkort, en delad skärm" \
            --distpath dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          name: web-build-artifact
          retention-days: 20

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: web-build-artifact
